<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Data Extractor</title>
    <meta name="description" content="Convert raw PDF invoice data into readable text effortlessly.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header>
            <h1>Invoice Decoder</h1>
            <p>Transform raw, unreadable PDF data back into clean, readable text.</p>
        </header>

        <main>
            <div class="upload-section" id="drop-zone">
                <div class="upload-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 16V8M12 8L9 11M12 8L15 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M4 16C4 17.1046 4.89543 18 6 18H18C19.1046 18 20 17.1046 20 16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h2>Drag & Drop your PDF here</h2>
                <p>or</p>
                <button class="btn primary-btn" id="browse-btn">Browse Files</button>
                <input type="file" id="file-input" accept="application/pdf" hidden>
            </div>

            <div class="loading-state hidden" id="loading-state">
                <div class="spinner"></div>
                <p>Decoding invoice data...</p>
            </div>

            <div class="result-section hidden" id="result-section">
                <div class="result-header">
                    <h3>Extracted Text</h3>
                    <div class="result-actions">
                        <button class="btn icon-btn tooltip" id="copy-btn" data-tooltip="Copy Text">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M8 4V16C8 17.1046 8.89543 18 10 18H20C21.1046 18 22 17.1046 22 16V4C22 2.89543 21.1046 2 20 2H10C8.89543 2 8 2.89543 8 4Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M16 18V20C16 21.1046 15.1046 22 14 22H4C2.89543 22 2 21.1046 2 20V8C2 6.89543 2.89543 6 4 6H6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                        <button class="btn secondary-btn" id="reset-btn">Upload Another</button>
                    </div>
                </div>
                <div class="result-content">
                    <textarea id="extracted-text" readonly placeholder="Your extracted text will appear here..."></textarea>
                </div>
                <div class="stats" id="doc-stats">
                    <span id="page-count">Pages: 0</span>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
